<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 额度查询平台</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <!-- Google Fonts: Space Grotesk + IBM Plex Sans + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 浮动装饰背景 -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">T</span>
                    Token 额度查询
                </h1>
                <div class="header-actions">
                    <span class="status-badge" id="statusBadge">
                        <span class="status-dot"></span>
                        <span id="statusText">准备查询</span>
                    </span>
                </div>
            </div>
        </header>

        <!-- 查询区域 -->
        <section class="query-section">
            <div class="query-box">
                <div class="input-group">
                    <input type="text" id="apiKeyInput" placeholder="输入 API Key 进行查询" class="api-key-input">
                    <button id="queryBtn" class="btn btn-primary">查询额度</button>
                </div>
                <div class="query-hint">
                    <span class="hint-icon">🔒</span>
                    <span>请输入 Key，查询当前额度、用量与最近调用记录。</span>
                </div>
            </div>
        </section>

        <!-- 结果区域 -->
        <main id="resultArea" class="result-area" style="display: none;">
            <!-- 额度详情 -->
            <section class="card quota-detail-card">
                <h2 class="card-title">
                    <span style="display:flex;align-items:center;gap:12px">
                        <span class="card-title-icon">💳</span>
                        额度详情
                    </span>
                </h2>
                <div class="quota-summary">
                    <div class="current-key">
                        <span class="label">当前 KEY</span>
                        <code id="displayKey">sk-xxx...xxxx</code>
                    </div>
                    <div class="quota-meters">
                        <div class="quota-meter">
                            <div class="meter-header">
                                <span class="meter-label">剩余额度</span>
                                <span class="meter-value text-success" id="remainQuota">0</span>
                            </div>
                            <div class="meter-bar">
                                <div class="meter-fill bg-success" id="remainBar" style="width: 0%"></div>
                            </div>
                            <div class="meter-footer">
                                <span id="remainYuan">≈ ¥0.00</span>
                            </div>
                        </div>
                        <div class="quota-meter">
                            <div class="meter-header">
                                <span class="meter-label">已用 Token</span>
                                <span class="meter-value" id="usedQuota">0</span>
                            </div>
                            <div class="meter-bar">
                                <div class="meter-fill bg-warning" id="usedBar" style="width: 0%"></div>
                            </div>
                            <div class="meter-footer">
                                <span id="usedYuan">≈ ¥0.00</span>
                            </div>
                        </div>
                        <div class="quota-total">
                            <span class="total-label">总额度 Token</span>
                            <span class="total-value" id="totalQuota">0</span>
                            <span class="total-yuan" id="totalYuan">≈ ¥0.00</span>
                        </div>
                    </div>
                </div>
                <div class="quota-info-grid" id="quotaInfoGrid">
                    <!-- 动态填充 -->
                </div>
            </section>

            <!-- 额度消耗统计 -->
            <section class="card stats-card">
                <h2 class="card-title">
                    <span style="display:flex;align-items:center;gap:12px">
                        <span class="card-title-icon">📊</span>
                        额度消耗统计
                    </span>
                </h2>
                <div class="stats-tabs">
                    <button class="tab-btn" data-range="today">今天 <span class="count" id="todayCount">0</span></button>
                    <button class="tab-btn" data-range="yesterday">昨天 <span class="count" id="yesterdayCount">0</span></button>
                    <button class="tab-btn" data-range="last_3_days">近3天 <span class="count" id="last3DaysCount">0</span></button>
                    <button class="tab-btn active" data-range="last_7_days">近7天 <span class="count" id="last7DaysCount">0</span></button>
                    <button class="tab-btn" data-range="last_30_days">近30天 <span class="count" id="last30DaysCount">0</span></button>
                </div>
                <div class="stats-content" id="statsContent">
                    <div class="stats-summary">
                        <div class="stat-item">
                            <span class="stat-label">请求次数</span>
                            <span class="stat-value" id="statCount">0 次</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">输入 Token</span>
                            <span class="stat-value" id="statPrompt">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">输出 Token</span>
                            <span class="stat-value" id="statCompletion">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">消耗配额</span>
                            <span class="stat-value" id="statQuota">0</span>
                        </div>
                    </div>
                    <div class="stats-detail">
                        <span class="detail-label">≈ ¥<span id="statQuotaYuan">0.00</span></span>
                    </div>
                </div>
            </section>

            <!-- 调用详情 -->
            <section class="card logs-card">
                <h2 class="card-title">
                    <span style="display:flex;align-items:center;gap:12px">
                        <span class="card-title-icon">📋</span>
                        调用详情
                    </span>
                    <span class="logs-total" id="logsTotal">共 0 条日志</span>
                </h2>
                <div class="logs-actions">
                    <button class="btn btn-sm" id="exportBtn">导出当前页</button>
                </div>
                <div class="table-container">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>模型</th>
                                <th>用时</th>
                                <th>输入</th>
                                <th>输出</th>
                                <th>花费</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody">
                            <!-- 动态填充 -->
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination">
                    <!-- 动态填充 -->
                </div>
            </section>
        </main>

        <!-- 错误提示 -->
        <div id="errorToast" class="toast toast-error" style="display: none;">
            <span>⚠️</span>
            <span id="errorMessage"></span>
        </div>

        <!-- 警告弹框 -->
        <div id="warningModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-icon" id="modalIcon">⚠️</div>
                <h2 class="modal-title" id="modalTitle">额度不足</h2>
                <p class="modal-message" id="modalMessage">您的Token额度已耗尽，请及时充值以继续使用服务。</p>
                <button class="modal-btn" id="modalCloseBtn">我知道了</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <span>查询中...</span>
        </div>
    </div>

    <script>
        // 全局状态
        let currentKey = '';
        let currentTimeRange = 'last_7_days';
        let currentPage = 1;
        let currentLogsData = [];

        // DOM 元素
        const apiKeyInput = document.getElementById('apiKeyInput');
        const queryBtn = document.getElementById('queryBtn');
        const resultArea = document.getElementById('resultArea');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const errorToast = document.getElementById('errorToast');
        const errorMessage = document.getElementById('errorMessage');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // 警告弹框 DOM 元素
        const warningModal = document.getElementById('warningModal');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        // 关闭弹框
        function closeWarningModal() {
            warningModal.classList.remove('show');
        }

        // 显示警告弹框
        function showWarningModal(type, message) {
            if (type === 'expired') {
                modalIcon.textContent = '⏰';
                modalIcon.className = 'modal-icon warning';
                modalTitle.textContent = 'Token 已过期';
                modalMessage.textContent = message || '您的 Token 已过期，请联系管理员续期后使用。';
            } else {
                modalIcon.textContent = '⚠️';
                modalIcon.className = 'modal-icon error';
                modalTitle.textContent = '额度已耗尽';
                modalMessage.textContent = message || '您的 Token 额度已耗尽，请及时充值以继续使用服务。';
            }
            warningModal.classList.add('show');
        }

        // 弹框关闭按钮事件
        modalCloseBtn.addEventListener('click', closeWarningModal);
        warningModal.addEventListener('click', (e) => {
            if (e.target === warningModal) {
                closeWarningModal();
            }
        });

        // 格式化数字（添加千分位）
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // 格式化Token数量（大于1万显示为万）
        function formatTokenCount(num) {
            if (num >= 100000000) {
                return (num / 100000000).toFixed(1) + '亿';
            } else if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return formatNumber(num);
        }

        // 显示错误
        function showError(message) {
            errorMessage.textContent = message;
            errorToast.style.display = 'flex';
            setTimeout(() => {
                errorToast.style.display = 'none';
            }, 5000);
        }

        // 显示Loading
        function showLoading() {
            loadingOverlay.style.display = 'flex';
        }

        // 隐藏Loading
        function hideLoading() {
            loadingOverlay.style.display = 'none';
        }

        // 更新状态
        function updateStatus(text, type = 'success') {
            statusText.textContent = text;
            statusBadge.className = 'status-badge status-' + type;
        }

        // 查询Token额度信息
        async function queryToken() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                showError('请输入 API Key');
                return;
            }

            currentKey = key;
            showLoading();
            updateStatus('查询中...', 'loading');

            try {
                // 查询额度信息
                const queryRes = await fetch(`/api/query?key=${encodeURIComponent(key)}`);
                const queryData = await queryRes.json();

                if (!queryData.success) {
                    hideLoading();
                    updateStatus('输入错误，请重新输入正确KEY', 'error');
                    showError(queryData.error || '输入错误，请重新输入正确KEY');
                    resultArea.style.display = 'none';
                    return;
                }

                const info = queryData.data;

                // 显示结果区域
                resultArea.style.display = 'block';

                // 更新额度信息
                document.getElementById('displayKey').textContent = info.key;
                document.getElementById('remainQuota').textContent = formatTokenCount(info.remain_quota);
                document.getElementById('remainYuan').textContent = '≈ ¥' + info.remain_yuan;
                document.getElementById('usedQuota').textContent = formatTokenCount(info.used_quota);
                document.getElementById('usedYuan').textContent = '≈ ¥' + info.used_yuan;
                document.getElementById('totalQuota').textContent = formatTokenCount(info.total_quota);
                document.getElementById('totalYuan').textContent = '≈ ¥' + info.total_yuan;

                // 计算百分比
                let remainPercent = 0;
                let usedPercent = 0;
                if (info.total_quota > 0) {
                    remainPercent = (info.remain_quota / info.total_quota) * 100;
                    usedPercent = (info.used_quota / info.total_quota) * 100;
                }
                document.getElementById('remainBar').style.width = remainPercent + '%';
                document.getElementById('usedBar').style.width = usedPercent + '%';

                // 更新配额信息网格
                const quotaInfoGrid = document.getElementById('quotaInfoGrid');
                let expiredHtml = '';
                if (info.is_expired) {
                    expiredHtml = '<div class="info-item error"><span class="info-label">状态</span><span class="info-value">已过期</span></div>';
                } else if (info.status === 1) {
                    expiredHtml = '<div class="info-item success"><span class="info-label">状态</span><span class="info-value">正常</span></div>';
                }

                quotaInfoGrid.innerHTML = `
                    <div class="info-item">
                        <span class="info-label">Token名称</span>
                        <span class="info-value">${info.name}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">汇率</span>
                        <span class="info-value">¥1 = ${formatNumber(info.exchange_rate)} Token</span>
                    </div>
                    ${expiredHtml}
                    ${info.expired_time ? `
                    <div class="info-item">
                        <span class="info-label">过期时间</span>
                        <span class="info-value">${info.expired_time}</span>
                    </div>
                    ` : ''}
                `;

                // 查询统计数据
                await loadStats(key);

                // 查询日志（默认近7天）
                currentTimeRange = 'last_7_days';
                await loadLogs(key, currentTimeRange, 1);

                hideLoading();
                updateStatus('查询成功', 'success');

                // 检查是否需要显示警告弹框
                if (info.is_expired) {
                    showWarningModal('expired');
                } else if (info.remain_quota <= 0) {
                    showWarningModal('quota');
                }

            } catch (err) {
                hideLoading();
                updateStatus('输入错误，请重新输入正确KEY', 'error');
                showError('网络错误: ' + err.message);
            }
        }

        // 加载统计数据
        async function loadStats(key) {
            try {
                const res = await fetch(`/api/stats?key=${encodeURIComponent(key)}`);
                const data = await res.json();

                if (!data.success) return;

                const stats = data.data;

                // 更新各时间范围的计数
                document.getElementById('todayCount').textContent = stats.today.count + '次';
                document.getElementById('yesterdayCount').textContent = stats.yesterday.count + '次';
                document.getElementById('last3DaysCount').textContent = stats.last_3_days.count + '次';
                document.getElementById('last7DaysCount').textContent = stats.last_7_days.count + '次';
                document.getElementById('last30DaysCount').textContent = stats.last_30_days.count + '次';

                // 更新当前选中范围的详细统计
                updateStatsDisplay(stats[currentTimeRange] || stats.last_7_days);

            } catch (err) {
                console.error('加载统计失败:', err);
            }
        }

        // 更新统计显示
        function updateStatsDisplay(stat) {
            document.getElementById('statCount').textContent = stat.count + ' 次';
            document.getElementById('statPrompt').textContent = formatNumber(stat.prompt_tokens);
            document.getElementById('statCompletion').textContent = formatNumber(stat.completion_tokens);
            document.getElementById('statQuota').textContent = formatTokenCount(stat.quota);
            document.getElementById('statQuotaYuan').textContent = stat.quota_yuan;
        }

        // 加载日志列表
        async function loadLogs(key, timeRange, page) {
            try {
                const res = await fetch(`/api/logs?key=${encodeURIComponent(key)}&time_range=${timeRange}&page=${page}`);
                const data = await res.json();

                if (!data.success) {
                    showError(data.error || '加载日志失败');
                    return;
                }

                currentLogsData = data.data.logs;
                currentPage = data.data.page;

                // 更新日志总数
                document.getElementById('logsTotal').textContent = `共 ${data.data.total} 条日志`;

                // 渲染表格
                renderLogsTable(data.data.logs);

                // 渲染分页
                renderPagination(data.data);

            } catch (err) {
                console.error('加载日志失败:', err);
            }
        }

        // 渲染日志表格
        function renderLogsTable(logs) {
            const tbody = document.getElementById('logsTableBody');

            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td>${log.created_at || '-'}</td>
                    <td>${log.model_name || '-'}</td>
                    <td>${log.use_time.toFixed(2)}s</td>
                    <td>${formatNumber(log.prompt_tokens)}</td>
                    <td>${formatNumber(log.completion_tokens)}</td>
                    <td>¥${log.quota_yuan}</td>
                </tr>
            `).join('');
        }

        // 渲染分页
        function renderPagination(data) {
            const pagination = document.getElementById('pagination');
            const { page, total_pages, total } = data;

            if (total === 0) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';

            // 上一页
            if (page > 1) {
                html += `<button class="page-btn" onclick="changePage(${page - 1})">上一页</button>`;
            }

            // 页码
            const maxPages = 5;
            let startPage = Math.max(1, page - Math.floor(maxPages / 2));
            let endPage = Math.min(total_pages, startPage + maxPages - 1);

            if (endPage - startPage < maxPages - 1) {
                startPage = Math.max(1, endPage - maxPages + 1);
            }

            if (startPage > 1) {
                html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
                if (startPage > 2) {
                    html += `<span class="page-ellipsis">...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            if (endPage < total_pages) {
                if (endPage < total_pages - 1) {
                    html += `<span class="page-ellipsis">...</span>`;
                }
                html += `<button class="page-btn" onclick="changePage(${total_pages})">${total_pages}</button>`;
            }

            // 下一页
            if (page < total_pages) {
                html += `<button class="page-btn" onclick="changePage(${page + 1})">下一页</button>`;
            }

            pagination.innerHTML = html;
        }

        // 切换页码
        function changePage(page) {
            loadLogs(currentKey, currentTimeRange, page);
        }

        // 切换时间范围
        function changeTimeRange(range) {
            currentTimeRange = range;

            // 更新标签样式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.range === range);
            });

            // 重新加载统计和日志
            loadLogs(currentKey, range, 1);

            // 更新统计显示（需要重新获取数据）
            fetchStatsForRange(range);
        }

        // 获取特定时间范围的统计
        async function fetchStatsForRange(range) {
            try {
                const res = await fetch(`/api/stats?key=${encodeURIComponent(currentKey)}`);
                const data = await res.json();

                if (!data.success) return;

                const stats = data.data;
                updateStatsDisplay(stats[range] || stats.last_7_days);

            } catch (err) {
                console.error('加载统计失败:', err);
            }
        }

        // 导出当前页日志
        function exportLogs() {
            if (!currentLogsData || currentLogsData.length === 0) {
                showError('暂无数据可导出');
                return;
            }

            const headers = ['时间', '模型', '用时(秒)', '输入', '输出', '花费(元)'];
            const rows = currentLogsData.map(log => [
                log.created_at || '-',
                log.model_name || '-',
                (log.use_time || 0).toFixed(2),
                log.prompt_tokens || 0,
                log.completion_tokens || 0,
                log.quota_yuan || '0.00'
            ]);

            const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `token_logs_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();

            URL.revokeObjectURL(url);
        }

        // 事件绑定
        queryBtn.addEventListener('click', queryToken);
        apiKeyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                queryToken();
            }
        });

        // 时间范围标签点击
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                changeTimeRange(btn.dataset.range);
            });
        });

        // 导出按钮
        document.getElementById('exportBtn').addEventListener('click', exportLogs);

        // 初始化状态
        updateStatus('准备查询', 'ready');
    </script>
</body>
</html>
